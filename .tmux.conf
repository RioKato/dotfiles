set -g prefix C-q
unbind C-b
setw -g mode-keys vi
set -g history-limit 5000
set -g visual-activity on
set -g monitor-activity on
set -g default-terminal screen-256color
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g mouse on

if -b 'which xsel &> /dev/null' {
  set -g copy-command "xsel -pi && xsel -po | xsel -bi"
  set -g @paste-command "xsel -bo | tmux load-buffer - ; tmux paste-buffer"
}

bind -n MouseDown3Pane run "#{@paste-command}"
bind ] run "#{@paste-command}"

if -b '[ -n "$EDITOR" ]' {
  bind -n C-v popup -w 90% -h 90% -d "#{pane_current_path}" -E \
    'TEMP_FILE=$(mktemp); trap "rm $TEMP_FILE" EXIT; $EDITOR $TEMP_FILE && tmux send "$(cat $TEMP_FILE)"'
}

###############################################################################################

if -b 'which fzf &> /dev/null' {
  FZF_TMUX=1
  FZF_TMUX_OPTS="-p 90%"
}

bind r run -b spawn-shell
