set -g prefix C-q
unbind C-b
setw -g mode-keys vi
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
set -g default-terminal screen-256color
set -g history-limit 5000
set -g visual-activity on
set -g monitor-activity on
set -g mouse on
set -s copy-command "xsel -pi && xsel -po | xsel -bi"
PASTE_COMMAND="xsel -bo | tmux load-buffer - ; tmux paste-buffer"
bind -T root MouseDown2Pane run $PASTE_COMMAND
bind -T root MouseDown3Pane run $PASTE_COMMAND
bind ] run $PASTE_COMMAND

bind r run tmux-spawn-shell
