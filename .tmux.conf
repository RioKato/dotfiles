set -g prefix C-q
unbind C-b
setw -g mode-keys vi
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
set -g default-terminal screen-256color
set -g history-limit 5000
set -g visual-activity on
set -g monitor-activity on
set -g mouse on
set -g copy-command "xsel -pi && xsel -po | xsel -bi"
set -g @paste-command "xsel -bo | tmux load-buffer - ; tmux paste-buffer"
bind -T root MouseDown2Pane run "#{@paste-command}"
bind -T root MouseDown3Pane run "#{@paste-command}"
bind ] run "#{@paste-command}"

bind r run "spawn-shell"
bind v run -b "IP=\$(FZF_TMUX=1 fzf-ip) && tmux send \$IP || exit 0"
