set -g prefix C-q
unbind C-b
setw -g mode-keys vi
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
set-option -g default-terminal screen-256color
set-option -g history-limit 5000
set -g visual-activity on
set -g monitor-activity on

bind r \
  send-keys "`which python python3 python2 | head -n 1` -c 'import pty; pty.spawn(\"/bin/bash\")'" Enter \;\
  run-shell "sleep 0.5" \;\
  send-keys C-z \;\
  send-keys "stty raw -echo" Enter \;\
  send-keys "fg" Enter \;\
  send-keys "reset" Enter \;\
  send-keys "export TERM=xterm" Enter \;\
  run-shell "tmux send-keys \"stty rows #{pane_height} columns #{pane_width}\" Enter"
